# ==============================================================================
# Parámetros de Usuario Personalizados para Zabbix Agent (Integración Snort)
# Ruta sugerida de colocación: /etc/zabbix/zabbix_agentd.d/snort.conf
# Autor: Iván
# ==============================================================================

# Habilitar parámetros de usuario en el agente Zabbix
# Permite que Zabbix Server consulte comandos personalizados ejecutados por el cliente

# 1. Monitorear número acumulado de alertas registradas en Snort
# Cuenta las líneas del archivo alert_fast (cada línea es una alerta activa)
UserParameter=snort.alert.count,wc -l /var/log/snort/alert_fast | cut -d' ' -f1

# 2. Obtener el último mensaje de alerta registrado en el log
# Muestra el último texto/mensaje de alerta del IDS
UserParameter=snort.alert.last,tail -n 1 /var/log/snort/alert_fast
